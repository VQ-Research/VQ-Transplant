<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1400" height="620" rx="34" fill="url(#bg)"/>
  <text x="700" y="60" text-anchor="middle" font-family="Inter,Arial" font-size="34" font-weight="800" fill="#0f172a">
    VQ-Transplant: replace only the VQ module, reuse the pretrained tokenizer
  </text>
  <text x="700" y="100" text-anchor="middle" font-family="Inter,Arial" font-size="19" fill="#475569">
    A two-stage framework for efficient plug-and-play VQ integration
  </text>

  <!-- Stage 0 -->
  <g filter="url(#shadow)">
    <rect x="70" y="165" width="360" height="285" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  </g>
  <text x="250" y="205" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#0f172a">Pretrained Tokenizer</text>
  <text x="250" y="232" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#64748b">expensive to train from scratch</text>
  <rect x="105" y="285" width="90" height="64" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="205" y="285" width="90" height="64" rx="14" fill="#fee2e2" stroke="#fca5a5"/>
  <rect x="305" y="285" width="90" height="64" rx="14" fill="#dcfce7" stroke="#86efac"/>
  <text x="150" y="321" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#1e3a8a">Encoder</text>
  <text x="250" y="313" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#991b1b">Native</text>
  <text x="250" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#991b1b">VQ</text>
  <text x="350" y="321" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#166534">Decoder</text>
  <text x="250" y="402" text-anchor="middle" font-family="Inter,Arial" font-size="17" fill="#334155">Strong visual tokenizer</text>

  <!-- Arrow 1 -->
  <line x1="455" y1="305" x2="555" y2="305" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="505" y="275" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#2563eb">Stage I</text>
  <text x="505" y="345" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#475569">substitute VQ</text>

  <!-- Stage 1 -->
  <g filter="url(#shadow)">
    <rect x="580" y="145" width="360" height="325" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  </g>
  <text x="760" y="185" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#0f172a">VQ Module Substitution</text>
  <text x="760" y="212" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#64748b">freeze encoder and decoder</text>
  <rect x="615" y="285" width="90" height="64" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="715" y="285" width="90" height="64" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <rect x="815" y="285" width="90" height="64" rx="14" fill="#dcfce7" stroke="#86efac"/>
  <text x="660" y="313" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#1e3a8a">Frozen</text>
  <text x="660" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#1e3a8a">Encoder</text>
  <text x="760" y="313" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#5b21b6">New</text>
  <text x="760" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#5b21b6">VQ</text>
  <text x="860" y="313" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#166534">Frozen</text>
  <text x="860" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#166534">Decoder</text>
  <rect x="665" y="392" width="190" height="40" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="760" y="417" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#2563eb">train new VQ only</text>

  <!-- Arrow 2 -->
  <line x1="965" y1="305" x2="1065" y2="305" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1015" y="275" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#2563eb">Stage II</text>
  <text x="1015" y="345" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#475569">adapt decoder</text>

  <!-- Stage 2 -->
  <g filter="url(#shadow)">
    <rect x="1090" y="145" width="240" height="325" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
  </g>
  <text x="1210" y="185" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#0f172a">Adapted Tokenizer</text>
  <text x="1210" y="212" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#64748b">lightweight decoder alignment</text>
  <rect x="1130" y="270" width="160" height="48" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1210" y="300" text-anchor="middle" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#1d4ed8">New VQ Space</text>
  <rect x="1130" y="338" width="160" height="48" rx="14" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1210" y="368" text-anchor="middle" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#166534">Adapted Decoder</text>
  <rect x="1120" y="410" width="180" height="38" rx="19" fill="url(#blue)"/>
  <text x="1210" y="435" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="800" fill="#ffffff">high-fidelity recon</text>

  <!-- Bottom metric strip -->
  <g>
    <rect x="125" y="515" width="1150" height="66" rx="22" fill="#0f172a"/>
    <text x="270" y="557" text-anchor="middle" font-family="Inter,Arial" font-size="22" font-weight="800" fill="#ffffff">21.8x faster</text>
    <text x="535" y="557" text-anchor="middle" font-family="Inter,Arial" font-size="22" font-weight="800" fill="#ffffff">0.81 rFID</text>
    <text x="800" y="557" text-anchor="middle" font-family="Inter,Arial" font-size="22" font-weight="800" fill="#ffffff">0.74 rFID extended</text>
    <text x="1080" y="557" text-anchor="middle" font-family="Inter,Arial" font-size="22" font-weight="800" fill="#ffffff">100% utilization</text>
  </g>
</svg>