<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" rx="24" fill="#ffffff"/>
  <text x="600" y="58" text-anchor="middle" font-family="Inter,Arial" font-size="32" font-weight="800" fill="#0f172a">ImageNet-1K Reconstruction Fidelity</text>
  <text x="600" y="92" text-anchor="middle" font-family="Inter,Arial" font-size="18" fill="#64748b">Lower rFID is better</text>

  <line x1="170" y1="430" x2="1080" y2="430" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="170" y1="145" x2="170" y2="430" stroke="#cbd5e1" stroke-width="2"/>
  <text x="135" y="150" font-family="Inter,Arial" font-size="14" fill="#64748b">1.0</text>
  <text x="135" y="430" font-family="Inter,Arial" font-size="14" fill="#64748b">0.7</text>
  <line x1="170" y1="150" x2="1080" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="170" y1="243" x2="1080" y2="243" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="170" y1="337" x2="1080" y2="337" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bars scale: y = 430 - (val - .7)/.3*280 -->
  <rect x="260" y="225" width="140" height="205" rx="16" fill="#93c5fd"/>
  <text x="330" y="210" text-anchor="middle" font-family="Inter,Arial" font-size="26" font-weight="800" fill="#1e3a8a">0.92</text>
  <text x="330" y="470" text-anchor="middle" font-family="Inter,Arial" font-size="17" font-weight="700" fill="#334155">VAR</text>

  <rect x="530" y="328" width="140" height="102" rx="16" fill="#a78bfa"/>
  <text x="600" y="313" text-anchor="middle" font-family="Inter,Arial" font-size="26" font-weight="800" fill="#4c1d95">0.81</text>
  <text x="600" y="470" text-anchor="middle" font-family="Inter,Arial" font-size="17" font-weight="700" fill="#334155">MMD VAR</text>
  <text x="600" y="493" text-anchor="middle" font-family="Inter,Arial" font-size="14" fill="#64748b">5 epochs adaptation</text>

  <rect x="800" y="394" width="140" height="36" rx="16" fill="#34d399"/>
  <text x="870" y="379" text-anchor="middle" font-family="Inter,Arial" font-size="26" font-weight="800" fill="#065f46">0.74</text>
